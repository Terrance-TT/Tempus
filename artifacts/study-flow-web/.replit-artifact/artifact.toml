kind = "web"
previewPath = "/web/"
title = "StudyFlow Web"
version = "1.0.0"
id = "artifacts/study-flow-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/web/" ]
localPort = 25418

[services.development]
run = "pnpm --filter @workspace/study-flow-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-flow-web", "run", "build" ]
publicDir = "artifacts/study-flow-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25418"
BASE_PATH = "/web/"
