<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="view-disconnected" class="view" hidden>
      <div class="brand">⏳ Tempus Focus Guard</div>
      <p class="hint">
        Paste your connection code from the Tempus website
        (<strong>Focus Guard</strong> tab).
      </p>
      <textarea id="code-input" rows="3" placeholder="Paste connection code here"></textarea>
      <button id="connect-btn">Connect</button>
      <p id="connect-error" class="error" hidden></p>
    </div>

    <div id="view-connected" class="view" hidden>
      <div id="clock" hidden>
        <div id="clock-time">–:–</div>
        <div id="clock-label"></div>
      </div>
      <div id="idle" hidden>
        <div id="idle-text"></div>
      </div>
      <button id="home-btn">Home</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
