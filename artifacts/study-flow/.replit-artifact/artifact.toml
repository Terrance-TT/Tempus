kind = "mobile"
previewPath = "/"
title = "StudyFlow"
version = "1.0.0"
id = "artifacts/study-flow"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25866

[services.development]
run = "pnpm --filter @workspace/study-flow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/study-flow", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/study-flow", "run", "serve" ]

[services.env]
PORT = "25866"
BASE_PATH = "/"
