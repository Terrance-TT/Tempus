openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: commitments
    description: Student commitments (classes, extracurriculars, routines)
  - name: schedules
    description: AI-generated schedules
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /commitments:
    get:
      operationId: listCommitments
      tags: [commitments]
      summary: List commitments for a device
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commitment"
    post:
      operationId: createCommitment
      tags: [commitments]
      summary: Create a commitment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommitmentInput"
      responses:
        "201":
          description: Created commitment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commitment"
  /commitments/extract-image:
    post:
      operationId: extractCommitmentsFromImage
      tags: [commitments]
      summary: Extract recurring commitments from a photo of a schedule/timetable
      description: >
        Accepts a photo of a student's timetable or schedule and uses AI vision
        to extract recurring commitments (classes, activities, routines). The
        extracted commitments are saved for the device and returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractCommitmentsInput"
      responses:
        "201":
          description: Extracted and saved commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commitment"
  /commitments/extract-text:
    post:
      operationId: extractCommitmentsFromText
      tags: [commitments]
      summary: Extract recurring commitments from a plain-text description
      description: >
        Accepts a free-text description of a student's weekly schedule
        (e.g. "I have school 8-3, soccer practice 4-5 on Tuesdays") and uses
        AI to extract recurring commitments. The extracted commitments are
        saved for the device and returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractCommitmentsTextInput"
      responses:
        "201":
          description: Extracted and saved commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commitment"
  /preferences:
    get:
      operationId: getPreferences
      tags: [preferences]
      summary: Get the saved scheduling preferences for a user/device
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Saved preferences (empty values if never saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      operationId: updatePreferences
      tags: [preferences]
      summary: Save scheduling preferences for a user/device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePreferencesInput"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
  /extension/token:
    post:
      operationId: createExtensionToken
      tags: [extension]
      summary: Create (or return) the focus-extension connection token for a user/device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExtensionTokenInput"
      responses:
        "200":
          description: Extension connection token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtensionTokenResult"
  /focus-guard/settings:
    get:
      operationId: getFocusGuardSettings
      tags: [focusGuard]
      summary: Get the Focus Guard extension settings for a user/device
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Focus Guard settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusGuardSettings"
    put:
      operationId: updateFocusGuardSettings
      tags: [focusGuard]
      summary: Update the Focus Guard extension settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFocusGuardSettingsInput"
      responses:
        "200":
          description: Updated Focus Guard settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusGuardSettings"
  /focus-guard/analytics:
    get:
      operationId: getFocusGuardAnalytics
      tags: [focusGuard]
      summary: Get per-site time analytics reported by the extension (Pro)
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
        - name: days
          in: query
          required: false
          schema:
            type: integer
            description: Look-back window in days (default 7).
      responses:
        "200":
          description: Per-site usage totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FocusGuardAnalytics"
  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit user feedback (quick bug report or the full survey)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitFeedbackInput"
      responses:
        "200":
          description: Acknowledgement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResult"
  /admin/status:
    get:
      operationId: getAdminStatus
      tags: [feedback]
      summary: Whether the signed-in user is a staff admin
      responses:
        "200":
          description: Admin status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatus"
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [feedback]
      summary: Aggregate usage statistics (admin only)
      responses:
        "200":
          description: Usage statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"
        "403":
          description: Not an admin
  /admin/feedback:
    get:
      operationId: listFeedback
      tags: [feedback]
      summary: List all feedback submissions (admin only)
      responses:
        "200":
          description: Feedback list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeedbackItem"
        "403":
          description: Not an admin
  /admin/feedback/{id}/status:
    put:
      operationId: updateFeedbackStatus
      tags: [feedback]
      summary: Mark a feedback item as resolved or new (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeedbackStatusInput"
      responses:
        "200":
          description: Updated feedback item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackItem"
        "403":
          description: Not an admin
  /claim-guest-data:
    post:
      operationId: claimGuestData
      tags: [preferences]
      summary: Reassign data created as a signed-out guest to the signed-in user
      description: >
        After a guest signs in, transfers commitments, schedules, assignments
        and preferences owned by the anonymous guest device id to the
        signed-in user's account. Requires an authenticated session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimGuestDataInput"
      responses:
        "200":
          description: Claim result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimGuestDataResult"
  /commitments/{id}:
    patch:
      operationId: updateCommitment
      tags: [commitments]
      summary: Update a commitment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommitmentInput"
      responses:
        "200":
          description: Updated commitment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commitment"
    delete:
      operationId: deleteCommitment
      tags: [commitments]
      summary: Delete a commitment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List schedule history for a device
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of schedule summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleSummary"
  /schedules/{id}:
    get:
      operationId: getSchedule
      tags: [schedules]
      summary: Get a schedule with its blocks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schedule detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    patch:
      operationId: updateSchedule
      tags: [schedules]
      summary: Manually edit a schedule's blocks
      description: Replaces the schedule's blocks with the provided list (manual editing).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleInput"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /schedules/{id}/revise:
    post:
      operationId: reviseSchedule
      tags: [schedules]
      summary: Ask AI to revise a schedule with a natural-language instruction
      description: >
        Takes an existing schedule and a free-text instruction (e.g. "move my
        study block later" or "add more breaks") and returns the revised
        schedule with updated blocks.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviseScheduleInput"
      responses:
        "200":
          description: Revised schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
  /google-calendar/status:
    get:
      operationId: getGoogleCalendarStatus
      tags: [google-calendar]
      summary: Whether the signed-in user has connected Google Calendar
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleCalendarStatus"
  /schedules/{id}/calendar-syncs:
    get:
      operationId: getScheduleCalendarSyncs
      tags: [schedules, google-calendar]
      summary: List Google Calendar sync records for a schedule's blocks
      description: >
        Returns which blocks in this schedule have been synced to Google
        Calendar, including the Google event id for each synced block.
        The schedule must belong to the signed-in user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of sync records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleCalendarSync"
  /schedules/{id}/sync-google-calendar:
    post:
      operationId: syncScheduleToGoogleCalendar
      tags: [schedules, google-calendar]
      summary: Push a schedule's blocks to the signed-in user's Google Calendar
      description: >
        Creates or updates Google Calendar events for every block in the
        schedule. Re-syncing updates the previously created events instead of
        creating duplicates, and removes events for blocks that no longer
        exist.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncScheduleGoogleCalendarInput"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncScheduleGoogleCalendarResult"
  /schedules/generate:
    post:
      operationId: generateSchedule
      tags: [schedules]
      summary: Generate an AI-recommended schedule, or ask clarifying questions first
      description: >
        Takes a student's commitments and generates a recommended schedule.
        If the AI needs more information (e.g. dinner time, homework load) it
        returns status "needs_clarification" with a list of questions instead
        of a finished schedule. Re-call with the same draftId and answers to
        continue.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScheduleInput"
      responses:
        "200":
          description: Either a completed schedule or a request for clarification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateScheduleResult"
  /integrations/status:
    get:
      operationId: getIntegrationsStatus
      tags: [integrations]
      summary: Connection status for school integrations (Canvas, Google Classroom)
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Integration connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsStatus"
  /integrations/canvas:
    post:
      operationId: connectCanvas
      tags: [integrations]
      summary: Connect a Canvas LMS account using a personal access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectCanvasInput"
      responses:
        "200":
          description: Updated integration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsStatus"
    delete:
      operationId: disconnectCanvas
      tags: [integrations]
      summary: Disconnect the Canvas LMS account
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Disconnected
  /integrations/canvas/import:
    post:
      operationId: importCanvasAssignments
      tags: [integrations]
      summary: Import upcoming assignments from Canvas LMS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportAssignmentsInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAssignmentsResult"
  /integrations/classroom/import:
    post:
      operationId: importClassroomAssignments
      tags: [integrations]
      summary: Import upcoming coursework from Google Classroom
      description: >
        Requires the signed-in user to have connected their Google account
        with Classroom access. Returns 409 if the Google connection is
        missing or needs to be re-authorized with Classroom permissions.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportAssignmentsInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAssignmentsResult"
  /integrations/schoology:
    post:
      operationId: connectSchoology
      tags: [integrations]
      summary: Connect a Schoology account using a consumer key and secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectSchoologyInput"
      responses:
        "200":
          description: Updated integration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsStatus"
    delete:
      operationId: disconnectSchoology
      tags: [integrations]
      summary: Disconnect the Schoology account
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Disconnected
  /integrations/schoology/import:
    post:
      operationId: importSchoologyAssignments
      tags: [integrations]
      summary: Import upcoming assignments from Schoology
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportAssignmentsInput"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportAssignmentsResult"
  /assignments:
    get:
      operationId: listAssignments
      tags: [integrations]
      summary: List imported assignments
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
  /assignments/{id}:
    delete:
      operationId: deleteAssignment
      tags: [integrations]
      summary: Delete an imported assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /sps-engage/preview-ics:
    post:
      operationId: previewSpsEngageIcs
      tags: [sps-engage]
      summary: Fetch and preview upcoming events from an SPS Engage ICS feed URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpsPreviewIcsInput"
      responses:
        "200":
          description: Upcoming events from the ICS feed (next 14 days)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpsEvent"
  /sps-engage/import-events:
    post:
      operationId: importSpsEngageEvents
      tags: [sps-engage]
      summary: Import selected SPS Engage events as extracurricular commitments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpsImportEventsInput"
      responses:
        "201":
          description: Created commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commitment"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CommitmentType:
      type: string
      enum: [class, extracurricular, routine]
    DayOfWeek:
      type: string
      enum: [mon, tue, wed, thu, fri, sat, sun]
    Commitment:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/CommitmentType"
        daysOfWeek:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
          description: 24h time, "HH:mm"
        endTime:
          type: string
          description: 24h time, "HH:mm"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - deviceId
        - title
        - type
        - daysOfWeek
        - startTime
        - endTime
        - createdAt
    CreateCommitmentInput:
      type: object
      properties:
        deviceId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/CommitmentType"
        daysOfWeek:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - deviceId
        - title
        - type
        - daysOfWeek
        - startTime
        - endTime
    UpdateCommitmentInput:
      type: object
      properties:
        deviceId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/CommitmentType"
        daysOfWeek:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - deviceId
    ExtractCommitmentsInput:
      type: object
      properties:
        deviceId:
          type: string
        imageBase64:
          type: string
          description: >
            The schedule photo, as a data URL (e.g. "data:image/png;base64,...")
            or a bare base64-encoded image string.
      required:
        - deviceId
        - imageBase64
    ExtractCommitmentsTextInput:
      type: object
      properties:
        deviceId:
          type: string
        description:
          type: string
          description: >
            Free-text description of the student's weekly schedule, e.g.
            "School 8am-3pm weekdays, soccer 4-5:30 Tue/Thu".
      required:
        - deviceId
        - description
    UserPreferences:
      type: object
      properties:
        wakeTime:
          type: string
          nullable: true
          description: 'When the student usually wakes up (e.g. "7:00 AM").'
        bedTime:
          type: string
          nullable: true
          description: 'When the student usually goes to bed (e.g. "10:30 PM").'
        mealTimes:
          type: string
          nullable: true
          description: 'Usual meal times, free text (e.g. "breakfast 7:30, lunch 12, dinner 6:30").'
        notes:
          type: string
          nullable: true
          description: Anything else the AI should keep in mind when scheduling.
      required: []
    UpdatePreferencesInput:
      type: object
      properties:
        deviceId:
          type: string
        wakeTime:
          type: string
          nullable: true
        bedTime:
          type: string
          nullable: true
        mealTimes:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required:
        - deviceId
    CreateExtensionTokenInput:
      type: object
      properties:
        deviceId:
          type: string
        rotate:
          type: boolean
          description: When true, invalidates any existing token and issues a new one.
      required:
        - deviceId
    ExtensionTokenResult:
      type: object
      properties:
        token:
          type: string
      required:
        - token
    FocusGuardSettings:
      type: object
      properties:
        blockedSites:
          type: array
          items:
            type: string
        blockMode:
          type: string
          enum: [work_blocks, non_free, always]
          description: >
            work_blocks — block only during homework/study blocks.
            non_free — block whenever any non-free block (class, work, etc.) is active.
            always — block all day regardless of schedule (useful for testing).
        active:
          type: boolean
        hideActivateSwitch:
          type: boolean
        showClock:
          type: boolean
      required:
        - blockedSites
        - blockMode
        - active
        - hideActivateSwitch
        - showClock
    UpdateFocusGuardSettingsInput:
      type: object
      properties:
        deviceId:
          type: string
        blockedSites:
          type: array
          items:
            type: string
        blockMode:
          type: string
          enum: [work_blocks, non_free, always]
        active:
          type: boolean
        hideActivateSwitch:
          type: boolean
        showClock:
          type: boolean
      required:
        - deviceId
    FocusGuardUsageTotal:
      type: object
      properties:
        domain:
          type: string
        seconds:
          type: integer
      required:
        - domain
        - seconds
    FocusGuardAnalytics:
      type: object
      properties:
        isPro:
          type: boolean
        totals:
          type: array
