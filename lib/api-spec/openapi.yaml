openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: commitments
    description: Student commitments (classes, extracurriculars, routines)
  - name: schedules
    description: AI-generated schedules
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /commitments:
    get:
      operationId: listCommitments
      tags: [commitments]
      summary: List commitments for a device
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commitment"
    post:
      operationId: createCommitment
      tags: [commitments]
      summary: Create a commitment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommitmentInput"
      responses:
        "201":
          description: Created commitment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commitment"
  /commitments/extract-image:
    post:
      operationId: extractCommitmentsFromImage
      tags: [commitments]
      summary: Extract recurring commitments from a photo of a schedule/timetable
      description: >
        Accepts a photo of a student's timetable or schedule and uses AI vision
        to extract recurring commitments (classes, activities, routines). The
        extracted commitments are saved for the device and returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractCommitmentsInput"
      responses:
        "201":
          description: Extracted and saved commitments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Commitment"
  /commitments/{id}:
    patch:
      operationId: updateCommitment
      tags: [commitments]
      summary: Update a commitment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCommitmentInput"
      responses:
        "200":
          description: Updated commitment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Commitment"
    delete:
      operationId: deleteCommitment
      tags: [commitments]
      summary: Delete a commitment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /schedules:
    get:
      operationId: listSchedules
      tags: [schedules]
      summary: List schedule history for a device
      parameters:
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of schedule summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleSummary"
  /schedules/{id}:
    get:
      operationId: getSchedule
      tags: [schedules]
      summary: Get a schedule with its blocks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Schedule detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    patch:
      operationId: updateSchedule
      tags: [schedules]
      summary: Manually edit a schedule's blocks
      description: Replaces the schedule's blocks with the provided list (manual editing).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScheduleInput"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    delete:
      operationId: deleteSchedule
      tags: [schedules]
      summary: Delete a schedule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
  /schedules/{id}/revise:
    post:
      operationId: reviseSchedule
      tags: [schedules]
      summary: Ask AI to revise a schedule with a natural-language instruction
      description: >
        Takes an existing schedule and a free-text instruction (e.g. "move my
        study block later" or "add more breaks") and returns the revised
        schedule with updated blocks.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviseScheduleInput"
      responses:
        "200":
          description: Revised schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
  /google-calendar/status:
    get:
      operationId: getGoogleCalendarStatus
      tags: [google-calendar]
      summary: Whether the signed-in user has connected Google Calendar
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleCalendarStatus"
  /schedules/{id}/calendar-syncs:
    get:
      operationId: getScheduleCalendarSyncs
      tags: [schedules, google-calendar]
      summary: List Google Calendar sync records for a schedule's blocks
      description: >
        Returns which blocks in this schedule have been synced to Google
        Calendar, including the Google event id for each synced block.
        The schedule must belong to the signed-in user.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of sync records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScheduleCalendarSync"
  /schedules/{id}/sync-google-calendar:
    post:
      operationId: syncScheduleToGoogleCalendar
      tags: [schedules, google-calendar]
      summary: Push a schedule's blocks to the signed-in user's Google Calendar
      description: >
        Creates or updates Google Calendar events for every block in the
        schedule. Re-syncing updates the previously created events instead of
        creating duplicates, and removes events for blocks that no longer
        exist.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncScheduleGoogleCalendarInput"
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncScheduleGoogleCalendarResult"
  /schedules/generate:
    post:
      operationId: generateSchedule
      tags: [schedules]
      summary: Generate an AI-recommended schedule, or ask clarifying questions first
      description: >
        Takes a student's commitments and generates a recommended schedule.
        If the AI needs more information (e.g. dinner time, homework load) it
        returns status "needs_clarification" with a list of questions instead
        of a finished schedule. Re-call with the same draftId and answers to
        continue.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateScheduleInput"
      responses:
        "200":
          description: Either a completed schedule or a request for clarification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateScheduleResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    CommitmentType:
      type: string
      enum: [class, extracurricular, routine]
    DayOfWeek:
      type: string
      enum: [mon, tue, wed, thu, fri, sat, sun]
    Commitment:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/CommitmentType"
        daysOfWeek:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
          description: 24h time, "HH:mm"
        endTime:
          type: string
          description: 24h time, "HH:mm"
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - deviceId
        - title
        - type
        - daysOfWeek
        - startTime
        - endTime
        - createdAt
    CreateCommitmentInput:
      type: object
      properties:
        deviceId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/CommitmentType"
        daysOfWeek:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - deviceId
        - title
        - type
        - daysOfWeek
        - startTime
        - endTime
    UpdateCommitmentInput:
      type: object
      properties:
        deviceId:
          type: string
        title:
          type: string
        type:
          $ref: "#/components/schemas/CommitmentType"
        daysOfWeek:
          type: array
          items:
            $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string
          nullable: true
      required:
        - deviceId
    ExtractCommitmentsInput:
      type: object
      properties:
        deviceId:
          type: string
        imageBase64:
          type: string
          description: >
            The schedule photo, as a data URL (e.g. "data:image/png;base64,...")
            or a bare base64-encoded image string.
      required:
        - deviceId
        - imageBase64
    Task:
      type: object
      description: An assignment or task the student needs to work on.
      properties:
        title:
          type: string
        dueDate:
          type: string
          description: 'When it is due, free text (e.g. "tomorrow", "Friday", "2026-07-10").'
        estimatedMinutes:
          type: integer
          nullable: true
          description: Rough estimate of how long the task will take, in minutes.
        notes:
          type: string
          nullable: true
      required:
        - title
        - dueDate
    ScheduleBlockCategory:
      type: string
      enum: [class, extracurricular, routine, homework, break, free]
    ScheduleBlock:
      type: object
      properties:
        id:
          type: string
        day:
          $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
        endTime:
          type: string
        title:
          type: string
        category:
          $ref: "#/components/schemas/ScheduleBlockCategory"
        notes:
          type: string
          nullable: true
      required:
        - id
        - day
        - startTime
        - endTime
        - title
        - category
    ScheduleStatus:
      type: string
      enum: [needs_clarification, complete]
    ScheduleScope:
      type: string
      enum: [day, week]
    ScheduleSummary:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        scope:
          $ref: "#/components/schemas/ScheduleScope"
        status:
          $ref: "#/components/schemas/ScheduleStatus"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - deviceId
        - scope
        - status
        - createdAt
    Schedule:
      type: object
      properties:
        id:
          type: string
        deviceId:
          type: string
        scope:
          $ref: "#/components/schemas/ScheduleScope"
        status:
          $ref: "#/components/schemas/ScheduleStatus"
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleBlock"
        clarifyingQuestions:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - deviceId
        - scope
        - status
        - blocks
        - clarifyingQuestions
        - createdAt
    ScheduleBlockInput:
      type: object
      properties:
        day:
          $ref: "#/components/schemas/DayOfWeek"
        startTime:
          type: string
        endTime:
          type: string
        title:
          type: string
        category:
          $ref: "#/components/schemas/ScheduleBlockCategory"
        notes:
          type: string
          nullable: true
      required:
        - day
        - startTime
        - endTime
        - title
        - category
    UpdateScheduleInput:
      type: object
      properties:
        deviceId:
          type: string
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/ScheduleBlockInput"
      required:
        - deviceId
        - blocks
    ReviseScheduleInput:
      type: object
      properties:
        deviceId:
          type: string
        instruction:
          type: string
          description: Natural-language description of the change the student wants.
      required:
        - deviceId
        - instruction
    ClarificationAnswer:
      type: object
      properties:
        question:
          type: string
        answer:
          type: string
      required:
        - question
        - answer
    GenerateScheduleInput:
      type: object
      properties:
        deviceId:
          type: string
        scope:
          $ref: "#/components/schemas/ScheduleScope"
        draftId:
          type: string
          nullable: true
          description: Pass the id returned from a prior needs_clarification response to continue that draft
        answers:
          type: array
          items:
            $ref: "#/components/schemas/ClarificationAnswer"
        tasks:
          type: array
          description: Assignments/tasks the student needs time for in this schedule.
          items:
            $ref: "#/components/schemas/Task"
      required:
        - deviceId
        - scope
    GoogleCalendarStatus:
      type: object
      properties:
        connected:
          type: boolean
      required:
        - connected
    SyncScheduleGoogleCalendarInput:
      type: object
      properties:
        timeZone:
          type: string
          description: >
            IANA timezone (e.g. "America/New_York") used to place each
            block's start/end times on the student's Google Calendar.
      required:
        - timeZone
    SyncScheduleGoogleCalendarResult:
      type: object
      properties:
        syncedCount:
          type: integer
        calendarUrl:
          type: string
      required:
        - syncedCount
        - calendarUrl
    ScheduleCalendarSync:
      type: object
      properties:
        blockId:
          type: string
        googleEventId:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - blockId
        - googleEventId
        - createdAt
    GenerateScheduleResult:
      type: object
      properties:
        id:
          type: string
        status:
          $ref: "#/components/schemas/ScheduleStatus"
        questions:
          type: array
          items:
            type: string
        schedule:
          $ref: "#/components/schemas/Schedule"
      required:
        - id
        - status
