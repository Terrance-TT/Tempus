services:
  # Backend API service
  - type: web
    name: tempus-api
    runtime: node
    plan: starter
    buildCommand: npm install -g pnpm@10.13.1 && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: CORS_ORIGINS
        value: "https://tempus-web.onrender.com,https://tempusfokus.com"
      - key: DATABASE_URL
        fromDatabase:
          name: tempus-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          name: tempus-api
          property: host
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_MODEL
        sync: false
      - key: DEFAULT_OBJECT_STORAGE_BASE_URL
        sync: false
      - key: DEFAULT_OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: DEFAULT_OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: PRIVATE_OBJECT_STORAGE_BASE_URL
        sync: false
      - key: PRIVATE_OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: PRIVATE_OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: PRIVATE_OBJECT_DIR
        sync: false
      - key: PUBLIC_OBJECT_STORAGE_BASE_URL
        sync: false
      - key: PUBLIC_OBJECT_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: PUBLIC_OBJECT_STORAGE_SECRET_ACCESS_KEY
        sync: false
      - key: PUBLIC_OBJECT_STORAGE_BUCKET_NAME
        sync: false
      - key: PUBLIC_OBJECT_STORAGE_DIR
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PUBLIC_KEY
        sync: false
      - key: PUBLIC_OBJECT_SEARCH_PRIVATE_KEY
        sync: false

  # Frontend web service
  - type: web
    name: tempus-web
    runtime: node
    plan: starter
    buildCommand: pnpm install && BASE_PATH=/ PORT=3000 pnpm --filter @workspace/study-flow-web run build
    startCommand: npx serve artifacts/study-flow-web/dist/public -l ${PORT}
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false

databases:
  - name: tempus-db
    plan: starter
    databaseName: tempus
    user: tempus
